<header role="banner">
  <nav
    class="site-nav"
    [class.scrolled]="isScrolled()"
    [class.menu-open]="isMenuOpen()"
    aria-label="Navegação principal"
  >
    <div class="nav-container">
      <!-- Logo -->
      <a href="#home" class="nav-logo" aria-label="Ir ao início" (click)="closeMenu()">
        <img src="assets/images/logofundobranco.png" alt="Rafael Nunes logo" width="110" height="auto" />
      </a>

      <!-- Desktop links -->
      <ul class="nav-links" role="list">
        <li><a href="#home" class="nav-link" [class.active]="activeSection() === 'home'" (click)="closeMenu()">Home</a></li>
        <li><a href="#about" class="nav-link" [class.active]="activeSection() === 'about'" (click)="closeMenu()">Sobre</a></li>
        <li><a href="#services" class="nav-link" [class.active]="activeSection() === 'services'" (click)="closeMenu()">Serviços</a></li>
        <li><a href="#skills" class="nav-link" [class.active]="activeSection() === 'skills'" (click)="closeMenu()">Skills</a></li>
        <li><a href="#projects" class="nav-link" [class.active]="activeSection() === 'projects'" (click)="closeMenu()">Projetos</a></li>
        <li><a href="#experiencias" class="nav-link" [class.active]="activeSection() === 'experiencias'" (click)="closeMenu()">Experiências</a></li>
        <li><a href="#contact" class="nav-link" [class.active]="activeSection() === 'contact'" (click)="closeMenu()">Contato</a></li>
      </ul>

      <!-- Hamburger (mobile) -->
      <button
        class="hamburger-btn"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen()"
        aria-controls="mobile-menu"
        aria-label="Abrir menu"
        id="hamburger-btn"
      >
        <span class="hamburger-bar" [class.open]="isMenuOpen()"></span>
        <span class="hamburger-bar" [class.open]="isMenuOpen()"></span>
        <span class="hamburger-bar" [class.open]="isMenuOpen()"></span>
      </button>
    </div>
  </nav>

  <!-- Mobile drawer -->
  <div
    id="mobile-menu"
    class="mobile-drawer"
    [class.open]="isMenuOpen()"
    role="dialog"
    aria-modal="true"
    aria-label="Menu de navegação"
  >
    <ul class="mobile-nav-links" role="list">
      <li><a href="#home" class="mobile-link" [class.active]="activeSection() === 'home'" (click)="closeMenu()">Home</a></li>
      <li><a href="#about" class="mobile-link" [class.active]="activeSection() === 'about'" (click)="closeMenu()">Sobre</a></li>
      <li><a href="#services" class="mobile-link" [class.active]="activeSection() === 'services'" (click)="closeMenu()">Serviços</a></li>
      <li><a href="#skills" class="mobile-link" [class.active]="activeSection() === 'skills'" (click)="closeMenu()">Skills</a></li>
      <li><a href="#projects" class="mobile-link" [class.active]="activeSection() === 'projects'" (click)="closeMenu()">Projetos</a></li>
      <li><a href="#experiencias" class="mobile-link" [class.active]="activeSection() === 'experiencias'" (click)="closeMenu()">Experiências</a></li>
      <li><a href="#contact" class="mobile-link" [class.active]="activeSection() === 'contact'" (click)="closeMenu()">Contato</a></li>
    </ul>
  </div>

  <!-- Overlay -->
  <div
    class="mobile-overlay"
    [class.open]="isMenuOpen()"
    (click)="closeMenu()"
    aria-hidden="true"
  ></div>
</header>
