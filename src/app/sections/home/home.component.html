<section class="hero-section" id="home" aria-label="Seção inicial">
  <div class="hero-inner">

    <!-- Text side -->
    <div class="hero-content">

      <span class="hero-badge fade-in-up" style="--delay: 0s">
        <span class="badge-dot"></span>
        Backend Developer | .NET Developer
      </span>

      <h1 class="hero-title fade-in-up" style="--delay: 0.15s">
        <span class="title-welcome">Seja bem-vindo(a) ao</span>
        <span class="title-portfolio">portfólio de</span>
        <span class="title-name">Rafael Nunes</span>
      </h1>

      <!-- Typewriter -->
      <div class="typewriter-wrapper fade-in-up" style="--delay: 0.35s" aria-live="polite" aria-label="Especialidades">
        <span class="typewriter-prefix">&gt;&nbsp;</span>
        <span class="typewriter-text">{{ displayedText }}</span>
        <span class="typewriter-cursor" [class.blink]="showCursor">|</span>
      </div>

      <!-- CTA Buttons -->
      <div class="hero-buttons fade-in-up" style="--delay: 0.55s">
        <a
          href="https://github.com/rafaelnunes93"
          target="_blank"
          rel="noopener noreferrer"
          class="btn-hero btn-github"
          aria-label="Ver GitHub"
          id="btn-github"
        >
          <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.17 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.005 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.65.25 2.87.12 3.17.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          GitHub
        </a>

        <a
          href="https://www.linkedin.com/in/rafaelnunesdossantos/"
          target="_blank"
          rel="noopener noreferrer"
          class="btn-hero btn-linkedin"
          aria-label="Ver LinkedIn"
          id="btn-linkedin"
        >
          <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.36V9h3.41v1.56h.05c.47-.9 1.63-1.85 3.35-1.85 3.58 0 4.24 2.36 4.24 5.43v6.31zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zm1.78 13.02H3.56V9h3.56v11.45zM22.23 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.46C23.21 24 24 23.23 24 22.28V1.72C24 .77 23.21 0 22.23 0z"/>
          </svg>
          LinkedIn
        </a>
      </div>

    </div>

    <!-- Image side -->
    <div class="hero-image-wrapper fade-in-up" style="--delay: 0.2s">
      <div class="hero-image-glow"></div>
      <div class="hero-image-container">
        <img
          src="assets/images/setup.png"
          alt="Ilustração de setup de desenvolvimento"
          class="hero-image float-anim"
          width="480"
          height="480"
          loading="eager"
        />
      </div>
    </div>

  </div>

  <!-- Scroll indicator -->
  <div class="scroll-indicator fade-in-up" style="--delay: 1s" aria-hidden="true">
    <div class="scroll-line"></div>
    <span class="scroll-text">scroll</span>
  </div>
</section>
