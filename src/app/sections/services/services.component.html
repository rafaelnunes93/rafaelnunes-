<section id="services">
  <div class="container">
    <div class="services-header">
      <h2>Como posso te ajudar?</h2>
      <p class="services-subtitle">
        Se você precisa de um sistema web, aplicativo mobile ou um jogo, está no lugar certo!
      </p>
    </div>

    <!-- Tabela / Grid de Serviços -->
    <div class="services-board">
      @for (service of services; track service.id) {
        <div class="service-cell">
          <div class="cell-top">
            <span class="service-index">{{ service.id }}</span>
            <div class="service-icon" [innerHTML]="service.iconSvg"></div>
          </div>
          
          <h3 class="service-title">
            {{ service.titleNormal }} <em>{{ service.titleColored }}</em>
          </h3>
          
          <p class="service-desc" [innerHTML]="service.description"></p>
        </div>
      }
    </div>
  </div>
</section>
